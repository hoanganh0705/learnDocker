apiVersion: apps/v1
kind: Deployment
metadata:
  name: story-deployment
  labels:
    app: story
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: story

  template:
    metadata:
      labels:
        app: story
        version: v1

    spec:
      containers:
        - name: story
          image: anhnguyen75/kub-data-demo
          imagePullPolicy: Always
          env: 
            - name: STORY_FOLDER
              valueFrom: 
                configMapKeyRef:
                  name: data-store-env
                  key: folder
          ports:
            - containerPort: 3000 # change if your app uses different port

          resources:
            requests:
              memory: '128Mi'
              cpu: '250m'
            limits:
              memory: '256Mi'
              cpu: '500m'

          volumeMounts:
            - mountPath: /app/story
              name: story-volume

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        - name: story-volume
          persistentVolumeClaim:
            claimName: host-pvc
